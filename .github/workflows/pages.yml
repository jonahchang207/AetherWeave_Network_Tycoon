# Validates the Jekyll docs site builds. Publish via Settings → Pages → /docs folder.
name: Docs

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"

jobs:
  jekyll-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: docs
      - run: bundle exec jekyll build --baseurl "/AetherWeave_Network_Tycoon"
